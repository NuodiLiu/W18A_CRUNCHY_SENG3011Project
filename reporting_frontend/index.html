<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Australia Economic Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
  <h1>Australia Economic Dashboard</h1>
  <p class="subtitle">Housing prices vs GDP — data from ESG Data Service &amp; mock sources</p>

  <!-- control bar -->
  <div class="controls">
    <label for="year-start">From</label>
    <input type="number" id="year-start" min="1990" max="2024">
    <label for="year-end">To</label>
    <input type="number" id="year-end" min="1990" max="2024">
    <button id="btn-load">Load</button>
    <span id="status"></span>
  </div>

  <!-- chart -->
  <div class="chart-container">
    <h2>Avg Housing Price vs GDP over Time</h2>
    <canvas id="chart-main"></canvas>
  </div>

  <!-- stat cards -->
  <div class="stat-cards">
    <div class="stat-card" id="stat-gdp">
      <h3>GDP</h3>
      <div class="stat-value">--</div>
      <div class="stat-desc">Loading...</div>
    </div>
    <div class="stat-card" id="stat-housing">
      <h3>Avg Housing Price</h3>
      <div class="stat-value">--</div>
      <div class="stat-desc">Loading...</div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>

# Docker Compose — local development infrastructure
# DynamoDB Local + LocalStack (S3 + SQS)

services:
  dynamodb-local:
    image: amazon/dynamodb-local:2.5.3
    container_name: esg-dynamodb-local
    ports:
      - "8000:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb -inMemory"

  localstack:
    image: localstack/localstack:3.7
    container_name: esg-localstack
    ports:
      - "4566:4566"      # gateway
    environment:
      - SERVICES=s3,sqs
      - DEFAULT_REGION=ap-southeast-2
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - localstack-data:/var/lib/localstack

  # ── Optional: run API in container ──
  # api:
  #   build: .
  #   ports:
  #     - "3000:3000"
  #   env_file: .env.example
  #   depends_on:
  #     - dynamodb-local
  #     - localstack
  #   command: ["node", "dist/main.js"]

  # ── Optional: run Worker in container ──
  # worker:
  #   build: .
  #   env_file: .env.example
  #   depends_on:
  #     - dynamodb-local
  #     - localstack
  #   command: ["node", "dist/worker.js"]

volumes:
  localstack-data:

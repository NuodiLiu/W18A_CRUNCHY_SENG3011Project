# ─────────────────────────────────────────────────────────────
# Docker Compose — one-click local dev environment
#
# Usage:
#   docker compose up -d          # start everything
#   docker compose logs -f api    # tail API logs
#   docker compose down -v        # teardown + remove volumes
#
# Architecture:
#   ┌──────────┐  ┌──────────┐      (simulated AWS)
#   │   API    │  │  Worker  │   ┌──────────────────────┐
#   │ :3000    │  │ SQS poll │   │  PostgreSQL    :5432 │
#   └────┬─────┘  └────┬─────┘   │  DynamoDB Local:8000 │
#        └──────┬───────┘         │  LocalStack    :4566 │
#               └─────────────────│   └─ S3              │
#                                 │   └─ SQS             │
#                                 └──────────────────────┘
# ─────────────────────────────────────────────────────────────

services:
  # ── PostgreSQL (events store) ──────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: data-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-eia_dev}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10

  # ── DynamoDB Local (jobs / state / idempotency) ─────────────
  dynamodb-local:
    image: amazon/dynamodb-local:3.3.0
    container_name: data-dynamodb-local
    ports:
      - "8000:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath /data"
    volumes:
      - dynamodb-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null -w '%{http_code}' http://localhost:8000 | grep -q '400'"]
      interval: 3s
      timeout: 3s
      retries: 10

  localstack:
    image: localstack/localstack:3.7
    container_name: data-localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3,sqs
      - DEFAULT_REGION=ap-southeast-2
      - PERSISTENCE=1
    volumes:
      - localstack-data:/var/lib/localstack
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health || exit 1"]
      interval: 5s
      retries: 10

  # ── Bootstrap: create tables, S3 buckets, SQS queue ──────────
  infra-init:
    build: .
    container_name: data-infra-init
    depends_on:
      postgres:
        condition: service_healthy
      dynamodb-local:
        condition: service_started
      localstack:
        condition: service_healthy
    environment:
      - AWS_REGION=ap-southeast-2
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-local}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-local}
      - DYNAMODB_ENDPOINT=http://dynamodb-local:8000
      - S3_ENDPOINT=http://localstack:4566
      - SQS_ENDPOINT=http://localstack:4566
      - PROJECT_PREFIX=${PROJECT_PREFIX:-eia}
      - PG_CONNECTION_STRING=${PG_CONNECTION_STRING:-postgres://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-eia_dev}}
    command: ["node", "dist/scripts/init-local-infra.js"]
    # exits after init; api & worker wait for it
    restart: "no"

  # ── Application: API server ────────────────────────────────
  api:
    build: .
    container_name: data-api
    ports:
      - "3000:3000"
    depends_on:
      infra-init:
        condition: service_completed_successfully
    environment:
      - APP_MODE=api
      - PORT=3000
      - AWS_REGION=ap-southeast-2
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-local}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-local}
      - DYNAMODB_ENDPOINT=http://dynamodb-local:8000
      - S3_ENDPOINT=http://localstack:4566
      - SQS_ENDPOINT=http://localstack:4566
      - PROJECT_PREFIX=${PROJECT_PREFIX:-eia}
      - PG_CONNECTION_STRING=${PG_CONNECTION_STRING:-postgres://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-eia_dev}}
    command: ["node", "dist/main.js"]

  # ── Application: Worker (SQS consumer) ─────────────────────
  worker:
    build: .
    container_name: data-worker
    depends_on:
      infra-init:
        condition: service_completed_successfully
    environment:
      - APP_MODE=worker
      - AWS_REGION=ap-southeast-2
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-local}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-local}
      - DYNAMODB_ENDPOINT=http://dynamodb-local:8000
      - S3_ENDPOINT=http://localstack:4566
      - SQS_ENDPOINT=http://localstack:4566
      - PROJECT_PREFIX=${PROJECT_PREFIX:-eia}
      - PG_CONNECTION_STRING=${PG_CONNECTION_STRING:-postgres://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-eia_dev}}
    command: ["node", "dist/worker.js"]

volumes:
  postgres-data:
  dynamodb-data:
  localstack-data:

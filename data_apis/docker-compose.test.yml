# ─────────────────────────────────────────────────────────────
# Docker Compose OVERRIDE — ephemeral infra for integration tests
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.test.yml up -d dynamodb-local localstack
#
# Overrides:
#   • DynamoDB Local  → -inMemory (no SQLite, no volume)
#   • LocalStack      → no PERSISTENCE, no volume
# ─────────────────────────────────────────────────────────────

services:
  dynamodb-local:
    command: "-jar DynamoDBLocal.jar -sharedDb -inMemory"
    volumes: []

  localstack:
    environment:
      - SERVICES=s3,sqs
      - DEFAULT_REGION=ap-southeast-2
    volumes: []

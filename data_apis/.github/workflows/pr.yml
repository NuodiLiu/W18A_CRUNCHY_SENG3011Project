name: CI — Lint, Typecheck, Test, Build

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

env:
  NODE_VERSION: "20"

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      dynamodb-local:
        image: amazon/dynamodb-local:2.5.3
        ports:
          - 8000:8000
        # No health-check options: the dynamodb-local image has no curl/wget,
        # so health-cmd would always fail. Readiness is probed via a runner step below.
      localstack:
        image: localstack/localstack:3.7
        ports:
          - 4566:4566
        env:
          SERVICES: s3,sqs
          DEFAULT_REGION: ap-southeast-2
        options: >-
          --health-cmd "curl -sf http://localhost:4566/_localstack/health || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Wait for service containers
        run: |
          echo "Waiting for DynamoDB Local on :8000..."
          for i in $(seq 1 30); do
            # DynamoDB Local returns 400 for bare requests — that still means it's up
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000 || true)
            if [ "$STATUS" != "000" ]; then
              echo "DynamoDB Local ready (HTTP $STATUS)"
              break
            fi
            echo "  attempt $i — not ready yet, waiting 2s"
            sleep 2
          done

          echo "Waiting for LocalStack on :4566..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4566/_localstack/health > /dev/null 2>&1; then
              echo "LocalStack ready"
              break
            fi
            echo "  attempt $i — not ready yet, waiting 2s"
            sleep 2
          done

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Init local infra
        run: npm run infra:local:init
        env:
          AWS_ACCESS_KEY_ID: local
          AWS_SECRET_ACCESS_KEY: local
          AWS_REGION: ap-southeast-2
          DYNAMODB_ENDPOINT: http://localhost:8000
          S3_ENDPOINT: http://localhost:4566
          SQS_ENDPOINT: http://localhost:4566

      - name: Integration tests
        run: npm run test:integration
        env:
          AWS_ACCESS_KEY_ID: local
          AWS_SECRET_ACCESS_KEY: local
          AWS_REGION: ap-southeast-2
          DYNAMODB_ENDPOINT: http://localhost:8000
          S3_ENDPOINT: http://localhost:4566
          SQS_ENDPOINT: http://localhost:4566

      - name: Docker build (smoke)
        run: docker build -t esg-data-service:ci-${{ github.sha }} .

          DYNAMODB_ENDPOINT: http://localhost:8000
          S3_ENDPOINT: http://localhost:4566
          SQS_ENDPOINT: http://localhost:4566
          PG_CONNECTION_STRING: ${{ env.CI_PG_CONN }}
          JEST_JUNIT_OUTPUT_DIR: reports/integration
          JEST_HTML_REPORTER_OUTPUT_PATH: reports/integration/report.html

      - name: Upload integration test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-report-${{ github.sha }}
          path: data_apis/reports/integration/
          retention-days: 30

      - name: Publish unit test results
        if: always() && hashFiles('data_apis/reports/unit/junit.xml') != ''
        uses: dorny/test-reporter@v1
        with:
          name: Unit Test Results
          path: 'data_apis/reports/unit/junit.xml'
          reporter: jest-junit
          fail-on-error: false

      - name: Publish integration test results
        if: always() && hashFiles('data_apis/reports/integration/junit.xml') != ''
        uses: dorny/test-reporter@v1
        with:
          name: Integration Test Results
          path: 'data_apis/reports/integration/junit.xml'
          reporter: jest-junit
          fail-on-error: false

      - name: Docker build (smoke)
        if: github.base_ref == 'develop' || github.ref == 'refs/heads/develop'
        run: docker build -t esg-data-service:ci-${{ github.sha }} .

      - name: Cleanup containers
        if: always()
        run: |
          docker rm -f dynamodb-local localstack 2>/dev/null || true

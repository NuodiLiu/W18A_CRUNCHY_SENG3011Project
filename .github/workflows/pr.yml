name: CI — Lint, Typecheck, Test, Build
# Credentials used here are ephemeral, randomly-generated per-run values
# for isolated test containers.  No real secrets are stored in this file.

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]  # main is handled by lambda-deploy.yml

env:
  NODE_VERSION: "20"

permissions:
  checks: write        # needed for dorny/test-reporter to post check runs
  pull-requests: write # needed for PR annotations
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: data_apis
    env:
      CI_POSTGRES_USER: postgres
      CI_POSTGRES_DB: eia_dev
      CI_AWS_KEY_ID: local

    steps:
      - uses: actions/checkout@v4

      - name: Generate ephemeral CI credentials
        run: |
          PG_PASS=$(openssl rand -hex 16)
          AWS_SECRET=$(openssl rand -hex 16)
          echo "CI_POSTGRES_PASSWORD=${PG_PASS}" >> "$GITHUB_ENV"
          echo "CI_AWS_SECRET=${AWS_SECRET}" >> "$GITHUB_ENV"
          echo "CI_PG_CONN=postgres://postgres:${PG_PASS}@localhost:5432/eia_dev" >> "$GITHUB_ENV"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: data_apis/package-lock.json

      - run: npm ci

      # ── Fast checks first (no containers needed) ──
      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:ci:unit
        env:
          JEST_JUNIT_OUTPUT_DIR: reports/unit
          JEST_HTML_REPORTER_OUTPUT_PATH: reports/unit/report.html

      - name: Upload unit test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report-${{ github.sha }}
          path: data_apis/reports/unit/
          retention-days: 30

      - name: Build Lambda bundles
        run: npm run build:lambda

      # ── Start containers only for integration tests ──
      - name: Start PostgreSQL
        run: |
          docker run -d --name postgres -p 5432:5432 \
            -e POSTGRES_USER=${{ env.CI_POSTGRES_USER }} \
            -e POSTGRES_PASSWORD=${{ env.CI_POSTGRES_PASSWORD }} \
            -e POSTGRES_DB=${{ env.CI_POSTGRES_DB }} \
            postgres:16-alpine

      - name: Start DynamoDB Local
        run: |
          docker run -d --name dynamodb-local -p 8000:8000 \
            amazon/dynamodb-local:3.3.0 \
            -jar DynamoDBLocal.jar -sharedDb -inMemory

      - name: Start LocalStack
        run: |
          docker run -d --name localstack -p 4566:4566 \
            -e SERVICES=s3,sqs \
            -e DEFAULT_REGION=ap-southeast-2 \
            localstack/localstack:3.7

      - name: Wait for services
        run: |
          echo "Waiting for PostgreSQL on :5432..."
          for i in $(seq 1 30); do
            if docker exec postgres pg_isready -U postgres > /dev/null 2>&1; then
              echo "PostgreSQL ready"
              break
            fi
            if [ "$i" -eq 30 ]; then echo "PostgreSQL failed to start"; docker logs postgres; exit 1; fi
            sleep 2
          done

          echo "Waiting for DynamoDB Local on :8000..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000 || true)
            if [ "$STATUS" != "000" ]; then
              echo "DynamoDB Local ready (HTTP $STATUS)"
              break
            fi
            if [ "$i" -eq 30 ]; then echo "DynamoDB Local failed to start"; docker logs dynamodb-local; exit 1; fi
            sleep 2
          done

          echo "Waiting for LocalStack on :4566..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4566/_localstack/health > /dev/null 2>&1; then
              echo "LocalStack ready"
              break
            fi
            if [ "$i" -eq 30 ]; then echo "LocalStack failed to start"; docker logs localstack; exit 1; fi
            sleep 2
          done

      - name: Init local infra
        run: npm run infra:local:init
        env:

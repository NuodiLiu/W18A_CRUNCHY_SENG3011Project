name: Lambda — Build & Deploy

# Deploys data_apis to AWS Lambda (ap-southeast-2 / Sydney)..
#
# Required GitHub secrets:
#   AWS_ROLE_ARN
#   PG_CONNECTION_STRING  — postgres connection URL for the events RDS instance
#                            (set via setup-lambda-infra.sh, stored in SSM)

on:
  push:
    branches: [main]
    paths:
      - "data_apis/**"
      - ".github/workflows/lambda-deploy.yml"
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC
  contents: read

env:
  AWS_REGION:     ap-southeast-2
  PROJECT_PREFIX: eia
  ENV_SUFFIX:     dev
  NODE_VERSION:   "20"

jobs:
  # ── Run unit tests ───────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: data_apis
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: data_apis/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck

      - name: Run unit tests
        run: npm test

  # ── Build Lambda bundles ────────────────────────────────────────────────
  build:
    name: Build Lambda Bundles
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: data_apis
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: data_apis/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Lambda bundles
        # build:lambda = tsoa spec-and-routes  +  esbuild bundle  +  asset copy
        run: npm run build:lambda

      - name: Package API handler ZIP
        run: |
          cd dist-lambda/api
          zip -r ../../lambda-api.zip .
          cd ../..
          echo "API ZIP size: $(du -sh lambda-api.zip | cut -f1)"

      - name: Package Worker handler ZIP
        run: |
          cd dist-lambda/worker
          zip -r ../../lambda-worker.zip .
          cd ../..
          echo "Worker ZIP size: $(du -sh lambda-worker.zip | cut -f1)"

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-api-${{ github.sha }}
          path: data_apis/lambda-api.zip
          retention-days: 7

      - name: Upload Worker artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-worker-${{ github.sha }}
          path: data_apis/lambda-worker.zip
          retention-days: 7

  # ── Deploy to Lambda ────────────────────────────────────────────────────
  deploy:
    name: Deploy to Lambda
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download API artifact
        uses: actions/download-artifact@v4
        with:
          name: lambda-api-${{ github.sha }}

      - name: Download Worker artifact
        uses: actions/download-artifact@v4
        with:
          name: lambda-worker-${{ github.sha }}

      # ── Deploy API Lambda ────────────────────────────────────────────────
      - name: Update API Lambda code
        run: |
          aws lambda update-function-code \
            --function-name "${{ env.PROJECT_PREFIX }}-${{ env.ENV_SUFFIX }}-api" \
            --zip-file fileb://lambda-api.zip \
            --region "${{ env.AWS_REGION }}" \
            --output text > /dev/null

      - name: Wait for API Lambda update
        run: |
          aws lambda wait function-updated \
            --function-name "${{ env.PROJECT_PREFIX }}-${{ env.ENV_SUFFIX }}-api" \
            --region "${{ env.AWS_REGION }}"

      - name: Publish API Lambda version
        id: publish-api
        run: |
          VERSION=$(aws lambda publish-version \
            --function-name "${{ env.PROJECT_PREFIX }}-${{ env.ENV_SUFFIX }}-api" \
            --description "SHA ${{ github.sha }}" \
            --region "${{ env.AWS_REGION }}" \
            --query Version --output text)
          echo "api_version=$VERSION" >> "$GITHUB_OUTPUT"

      # ── Deploy Worker Lambda ─────────────────────────────────────────────
      - name: Update Worker Lambda code
        run: |
          aws lambda update-function-code \
            --function-name "${{ env.PROJECT_PREFIX }}-${{ env.ENV_SUFFIX }}-worker" \
            --zip-file fileb://lambda-worker.zip \
            --region "${{ env.AWS_REGION }}" \
            --output text > /dev/null

      - name: Wait for Worker Lambda update
        run: |
          aws lambda wait function-updated \
            --function-name "${{ env.PROJECT_PREFIX }}-${{ env.ENV_SUFFIX }}-worker" \
            --region "${{ env.AWS_REGION }}"

      - name: Publish Worker Lambda version
        id: publish-worker
        run: |
          VERSION=$(aws lambda publish-version \
            --function-name "${{ env.PROJECT_PREFIX }}-${{ env.ENV_SUFFIX }}-worker" \
            --description "SHA ${{ github.sha }}" \
            --region "${{ env.AWS_REGION }}" \
            --query Version --output text)
          echo "worker_version=$VERSION" >> "$GITHUB_OUTPUT"

      # ── Smoke test ───────────────────────────────────────────────────────
      - name: Smoke test — /health
        run: |
          API_ID=$(aws apigatewayv2 get-apis \
            --region "${{ env.AWS_REGION }}" \
            --query "Items[?Name=='${{ env.PROJECT_PREFIX }}-${{ env.ENV_SUFFIX }}-http-api'].ApiId | [0]" \
            --output text)
          URL="https://${API_ID}.execute-api.${{ env.AWS_REGION }}.amazonaws.com/health"
          echo "Smoke testing: $URL"
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "$URL" || echo "000")
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check failed (HTTP $STATUS)"
            exit 1
          fi
          echo "✅ Health check passed (HTTP $STATUS)"

      - name: Deployment summary
        run: |
          echo "## Lambda Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **API Lambda version** | ${{ steps.publish-api.outputs.api_version }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Worker Lambda version** | ${{ steps.publish-worker.outputs.worker_version }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Git SHA** | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Region** | ${{ env.AWS_REGION }} |" >> "$GITHUB_STEP_SUMMARY"

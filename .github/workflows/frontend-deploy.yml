name: Frontend — Build & Deploy

# Deploys reporting_frontend to S3 + CloudFront (ap-southeast-2 / Sydney).
#
# Required GitHub secrets:
#   AWS_ROLE_ARN  — same OIDC role used by lambda-deploy.yml

on:
  push:
    branches: [main]
    paths:
      - "reporting_frontend/**"
      - ".github/workflows/frontend-deploy.yml"
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC
  contents: read

env:
  AWS_REGION:      ap-southeast-2
  PROJECT_PREFIX:  eia
  ENV_SUFFIX:      dev
  FRONTEND_BUCKET: eia-dev-frontend

jobs:
  # ── Run frontend tests before deploying ────────────────────────
  test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: reporting_frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Contract tests
        run: npm run test:contract

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e

      - name: Upload frontend test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-report-${{ github.sha }}
          path: reporting_frontend/reports/
          retention-days: 30

  # ── Deploy to S3 + CloudFront ──────────────────────────────────
  deploy:
    name: Deploy Frontend to S3 + CloudFront
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        run: |
          aws s3 sync reporting_frontend/ s3://${{ env.FRONTEND_BUCKET }}/ \
            --region ${{ env.AWS_REGION }} \
            --delete \
            --cache-control "max-age=86400" \
            --exclude "*.html" \
            --exclude "node_modules/*" \
            --exclude "tests/*" \
            --exclude "package.json" \
            --exclude "package-lock.json" \
            --exclude "vitest.config.js" \
            --exclude "playwright.config.js" \
            --exclude "playwright-report/*" \
            --exclude "reports/*" \
            --exclude ".gitignore"

          # HTML files: no cache so users always get latest
          aws s3 sync reporting_frontend/ s3://${{ env.FRONTEND_BUCKET }}/ \
            --region ${{ env.AWS_REGION }} \
            --delete \
            --cache-control "no-cache, no-store, must-revalidate" \
            --include "*.html" \
            --exclude "node_modules/*" \
            --exclude "tests/*"

      - name: Invalidate CloudFront cache
        run: |
          CF_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Origins.Items[0].DomainName=='${{ env.FRONTEND_BUCKET }}.s3.${{ env.AWS_REGION }}.amazonaws.com'].Id | [0]" \
            --output text)

          if [ "$CF_ID" = "None" ] || [ -z "$CF_ID" ]; then
            echo "❌ CloudFront distribution not found for bucket ${{ env.FRONTEND_BUCKET }}"
            exit 1
          fi

          aws cloudfront create-invalidation \
            --distribution-id "$CF_ID" \
            --paths "/*"

          echo "✅ Invalidation created for distribution $CF_ID"

      - name: Deployment summary
        run: |
          CF_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Origins.Items[0].DomainName=='${{ env.FRONTEND_BUCKET }}.s3.${{ env.AWS_REGION }}.amazonaws.com'].Id | [0]" \
            --output text)
          CF_DOMAIN=$(aws cloudfront get-distribution \
            --id "$CF_ID" \
            --query "Distribution.DomainName" --output text)
          echo "## Frontend Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **S3 Bucket** | ${{ env.FRONTEND_BUCKET }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **CloudFront URL** | https://${CF_DOMAIN} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Git SHA** | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
